name: Deploy ETS Vietnam App

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Cache deps
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      # 4. Install
      - name: Install dependencies
        run: npm ci

      # 5. Build
      - name: Build app
        run: npm run build

      # 🔥 6. Debug root (rất quan trọng)
      - name: Debug root files
        run: ls -la

      # 🔥 7. Tạo build package (FIX CHẮC CHẮN package.json)
      - name: Create build package
        run: |
          rm -rf deploy build.zip
          mkdir deploy

          # Copy build
          cp -r .next deploy/
          cp -r public deploy/ || true

          # CHECK package.json
          if [ ! -f package.json ]; then
            echo "❌ package.json NOT FOUND!"
            exit 1
          fi

          cp package.json deploy/
          cp package-lock.json deploy/ || true
          cp next.config.js deploy/ || true

          # Debug deploy folder
          echo "📦 Deploy folder content:"
          ls -la deploy

          # Zip
          cd deploy
          zip -r ../build.zip .

      # 🔥 8. Verify zip (anti lỗi)
      - name: Check build.zip
        run: unzip -l build.zip

      # 9. Upload
      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "build.zip"
          target: "~/etsvietnamapp"

      # 10. Deploy server
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Go to app folder"
            mkdir -p ~/etsvietnamapp
            cd ~/etsvietnamapp

            echo "Clean old build"
            rm -rf .next node_modules package.json package-lock.json

            echo "Unzip new build"
            unzip -o build.zip

            echo "Check files after unzip"
            ls -la

            echo "Install production deps"
            npm install --omit=dev

            echo "Restart app (zero downtime)"
            pm2 reload nextjs-app || pm2 start npm --name "nextjs-app" -- start

            echo "Save PM2"
            pm2 save
