name: Deploy ETS Vietnam App

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Cache node_modules (tăng tốc)
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      # 4. Install deps
      - name: Install dependencies
        run: npm install

      # 5. Build Next.js
      - name: Build app
        run: npm run build

      # 6. Tạo file deploy (chỉ chứa build)
      - name: Create build package
        run: |
          mkdir deploy
          cp -r .next deploy/
          cp -r public deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp next.config.js deploy/ || true

          cd deploy
          zip -r ../build.zip .

      # 7. Upload lên server
      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "build.zip"
          target: "~/etsvietnamapp"

      # 8. SSH vào server để deploy
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Go to app folder"
            mkdir -p ~/etsvietnamapp
            cd ~/etsvietnamapp

            echo "Clean old build"
            rm -rf .next node_modules

            echo "Unzip new build"
            unzip -o build.zip

            echo "Install production deps"
            npm install --omit=dev

            echo "Restart app"
            pm2 delete nextjs-app || true
            pm2 start npm --name "nextjs-app" -- start

            echo "Save PM2"
            pm2 save
