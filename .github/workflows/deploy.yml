name: Deploy ETS Vietnam App

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "Move to HOME"
            cd ~

            echo "Check folder exists"
            if [ ! -d "etsvietnamapp" ]; then
              echo "Folder not found → cloning repo"
              git clone https://github.com/<YOUR_USERNAME>/<YOUR_REPO>.git etsvietnamapp
            fi

            echo "Go to project"
            cd ~/etsvietnamapp

            echo "Pull latest code"
            git pull origin master

            echo "Install deps"
            npm install

            echo "Build"
            npm run build

            echo "Restart app"
            pm2 delete nextjs-app || true
            pm2 start npm --name "nextjs-app" -- start

            echo "Save PM2"
            pm2 save
