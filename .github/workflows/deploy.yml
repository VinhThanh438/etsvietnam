name: Deploy ETS Vietnam App

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Tự động tìm project chứa package.json
      - name: Detect project path
        id: detect
        run: |
          PROJECT_DIR=$(dirname $(find . -name package.json | head -n 1))
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Detected project at: $PROJECT_DIR"

      # 4. Install deps
      - name: Install dependencies
        run: |
          cd $PROJECT_DIR
          npm ci

      # 5. Build
      - name: Build app
        run: |
          cd $PROJECT_DIR
          npm run build

      # 6. Tạo build package
      - name: Create build package
        run: |
          rm -rf deploy build.zip
          mkdir deploy

          cd $PROJECT_DIR

          cp -r .next ../../deploy/
          cp -r public ../../deploy/ 2>/dev/null || true
          cp package.json ../../deploy/
          cp package-lock.json ../../deploy/ 2>/dev/null || true
          cp next.config.js ../../deploy/ 2>/dev/null || true

          cd ../../deploy
          zip -r ../build.zip .

      # 7. Check zip (đảm bảo có package.json)
      - name: Verify build.zip
        run: unzip -l build.zip

      # 8. Upload lên server
      - name: Upload build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "build.zip"
          target: "~/etsvietnamapp"

      # 9. Deploy trên server
      - name: Deploy server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p ~/etsvietnamapp
            cd ~/etsvietnamapp

            echo "Clean old build"
            rm -rf .next node_modules package.json package-lock.json

            echo "Unzip new build"
            unzip -o build.zip

            echo "Check files"
            ls -la

            echo "Install production deps"
            npm install --omit=dev

            echo "Restart app (zero downtime)"
            pm2 reload nextjs-app || pm2 start npm --name "nextjs-app" -- start

            pm2 save
