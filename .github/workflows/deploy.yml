name: Deploy Next.js Standalone

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          # Tạo key dựa trên OS và nội dung các file config/source
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Package Standalone
        run: |
          mkdir -p build_output
          # Copy standalone files
          cp -r .next/standalone/. build_output/
          # Copy static files (standalone doesn't include these)
          mkdir -p build_output/.next/static
          cp -r .next/static/. build_output/.next/static/
          # Copy public folder
          cp -r public build_output/ 2>/dev/null || true
          
          # Compress using zip (native for the user's setup)
          cd build_output
          zip -nq -r ../build.zip .
          cd ..

      - name: Upload to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "build.zip"
          target: "~/etsvietnamapp"

      - name: Deploy and Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/etsvietnamapp
            # Unzip and clean up
            unzip -o build.zip -d .
            rm build.zip
            
            # Start/Restart with PM2
            # Sử dụng --update-env để đảm bảo các biến môi trường mới nhất được nạp
            pm2 delete nextjs-app || true
            pm2 start server.js --name "nextjs-app" --update-env
            pm2 save
